kind = "mobile"
previewPath = "/"
title = "Card Scanner"
version = "1.0.0"
id = "artifacts/card-scanner"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22825

[services.development]
run = "pnpm --filter @workspace/card-scanner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/card-scanner", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/card-scanner", "run", "serve" ]

[services.env]
PORT = "22825"
BASE_PATH = "/"
