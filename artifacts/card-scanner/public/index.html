<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />

    <!-- Full-viewport PWA: no address bar, no rubber-band white borders -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0B0D17" />

    <title>CardScan</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <style>
      /*
       * iOS PWA fullscreen lock — position:fixed is the key.
       * overflow:hidden alone is not enough: iOS Safari still detects
       * a scrollable document when FlatList mounts and shows the toolbar.
       * position:fixed removes the document from the scroll model entirely
       * so the toolbar has no reason to appear on any tab.
       */
      html,
      body,
      #root {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #0b0d17;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <!--
      Safe-area top fill — CSS-native, zero JS dependency.
      Paints #0B0D17 behind the Dynamic Island and status bar before
      React boots, so useSafeAreaInsets() returning 0 on first render
      (known iOS PWA bug) never exposes a wrong-color strip.
    -->
    <div
      aria-hidden="true"
      style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: env(safe-area-inset-top);
        background: #0b0d17;
        z-index: 9999;
        pointer-events: none;
      "
    ></div>

    <div id="root"></div>
  </body>
</html>
