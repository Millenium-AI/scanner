<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />

    <!-- Full-viewport PWA: no address bar, no rubber-band white borders -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0B0D17" />

    <title>CardScan</title>
    <link rel="manifest" href="/manifest.json" />

    <style>
      /* iOS PWA: use logical viewport units so the app fills the full screen
         including under the status bar and above the home indicator.
         env(safe-area-inset-*) ensures content isn't obscured by the notch/home bar. */
      html {
        background: #0B0D17;
        margin: 0;
        padding: 0;
        overscroll-behavior: none;
        overflow: hidden;
        height: 100%;
        width: 100%;
      }

      body {
        background: #0B0D17;
        margin: 0;
        padding: 0;
        /* Use logical viewport height — ignores Safari toolbar, fills full screen on PWA */
        height: 100lvh;
        width: 100lvw;
        overscroll-behavior: none;
        overflow: hidden;
        /* Bottom safe area only — top is handled per-page in JS via insets.top */
        padding-bottom: env(safe-area-inset-bottom);
        box-sizing: border-box;
      }

      #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
